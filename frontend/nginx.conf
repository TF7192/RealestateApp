# ── OG unfurler routing (task 2.2) ────────────────────────────────
# Link-preview scrapers don't execute JS, so the SPA's client-side
# og:* meta tags never reach them. Detect the common ones and rewrite
# the property URLs to the backend's server-rendered OG endpoint.
#
# `map` lives at http-context (conf.d files are included inside http{})
# — putting it inside the server block triggers "directive not allowed
# here" at nginx parse time.
map $http_user_agent $is_social_bot {
  default                                 0;
  "~*whatsapp"                            1;
  "~*facebookexternalhit"                 1;
  "~*facebot"                             1;
  "~*twitterbot"                          1;
  "~*linkedinbot"                         1;
  "~*telegrambot"                         1;
  "~*slackbot"                            1;
  "~*discordbot"                          1;
  "~*pinterest"                           1;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Allow up to 120MB uploads (property videos cap at 100MB + buffer)
  client_max_body_size 120m;
  client_body_buffer_size 1m;

  # API proxy — everything under /api goes to the backend container.
  # Upgrade/Connection headers turn this into a WebSocket-aware proxy
  # (used by /api/chat/ws for the in-app chat real-time feed).
  location /api/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_request_buffering off;
  }

  # Serve uploaded files (signed PDFs, property photos) via the backend
  location /uploads/ {
    proxy_pass http://backend:4000;
    proxy_set_header Host $host;
  }

  # Agent public property page — bot-detect and route to OG endpoint.
  location ~ ^/agents/([^/]+)/([^/]+)/?$ {
    if ($is_social_bot) {
      rewrite ^ /api/public/og/property/$1/$2 last;
    }
    try_files $uri /index.html;
  }

  # Landing page — pre-rendered static HTML served at `/` only.
  # Fully self-contained (inline CSS + inline SVG + tiny defer JS).
  # Every other route falls through to the SPA fallback below.
  location = / {
    try_files /landing.html =404;
  }

  # SPA fallback — /login, /properties, /terms, /privacy, etc.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
