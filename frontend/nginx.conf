# ── OG unfurler routing (task 2.2) ────────────────────────────────
# Link-preview scrapers don't execute JS, so the SPA's client-side
# og:* meta tags never reach them. Detect the common ones and rewrite
# the property URLs to the backend's server-rendered OG endpoint.
#
# `map` lives at http-context (conf.d files are included inside http{})
# — putting it inside the server block triggers "directive not allowed
# here" at nginx parse time.
map $http_user_agent $is_social_bot {
  default                                 0;
  "~*whatsapp"                            1;
  "~*facebookexternalhit"                 1;
  "~*facebot"                             1;
  "~*twitterbot"                          1;
  "~*linkedinbot"                         1;
  "~*telegrambot"                         1;
  "~*slackbot"                            1;
  "~*discordbot"                          1;
  "~*pinterest"                           1;
}

server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Allow up to 120MB uploads (property videos cap at 100MB + buffer)
  client_max_body_size 120m;
  client_body_buffer_size 1m;

  # PERF-023 — split /api/ into upload-aware and JSON-default branches.
  #
  # `proxy_request_buffering off` is the right setting for big multipart
  # uploads (property photos / videos / avatars / signed agreement PDFs)
  # because nginx would otherwise spool 100MB to /tmp before forwarding.
  # For everything else — small JSON GETs / writes that dominate request
  # volume — buffering speeds up the backend by letting nginx absorb
  # slow clients. We split the location accordingly: the upload-style
  # paths keep buffering off + a generous body size, the default branch
  # gets defaults + a tight 2MB body cap (anything past that on a
  # non-upload route is almost certainly malicious).
  #
  # Regex location matches first; nested location order doesn't matter
  # because both branches `proxy_pass` to the same upstream — only the
  # buffering / body-size knobs differ.
  location ~ ^/api/.*/(images|videos|avatar|documents) {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_request_buffering off;
    client_max_body_size 100m;
  }

  location /api/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # PERF-012 — AI chat streaming uses SSE under /api/ai/chat/stream.
    # Disable response buffering so each token flushes to the browser
    # immediately; the default proxy_read_timeout (600s) still bounds
    # runaway streams.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    client_max_body_size 2m;
  }

  # Serve uploaded files (signed PDFs, property photos) via the backend.
  # PERF-010 — filenames are uuid-based so the URL is effectively
  # immutable; long-cache them at the browser + edge so repeat visits
  # skip the redirect chain. New property uploads (PERF-005/016) write
  # public S3 URLs directly and bypass /uploads/ entirely; this branch
  # only matters for legacy rows + non-image documents until those are
  # backfilled.
  location /uploads/ {
    proxy_pass http://backend:4000;
    proxy_set_header Host $host;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Dynamic sitemap — backend generates fresh XML on each request
  # (cached 1h at the origin via Cache-Control). Lives at the root
  # path Google Search Console expects.
  location = /sitemap.xml {
    proxy_pass http://backend:4000/sitemap.xml;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Agent public property page — bot-detect and route to OG endpoint.
  location ~ ^/agents/([^/]+)/([^/]+)/?$ {
    if ($is_social_bot) {
      rewrite ^ /api/public/og/property/$1/$2 last;
    }
    try_files $uri /index.html;
  }

  # Landing page — pre-rendered static HTML served at `/` only.
  # Fully self-contained (inline CSS + inline SVG + tiny defer JS).
  # Every other route falls through to the SPA fallback below.
  # PERF-010 — never cache the SPA shell. Browsers default to
  # heuristic caching on text/html which means a fresh deploy can
  # serve a stale index.html that loads stale `/assets/*-<hash>.js`
  # chunks. Explicit no-cache makes the contract clean.
  location = / {
    add_header Cache-Control "no-cache";
    try_files /landing.html =404;
  }

  # PERF-010 — same defensive `no-cache` for the SPA entrypoint that
  # the React Router fallback eventually serves. The fingerprinted
  # /assets/* chunks under it can long-cache (handled below).
  location = /index.html {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # SPA fallback — /login, /properties, /terms, /privacy, etc.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}

# Canonical-host redirect. The OAuth flow sets the state cookie under
# whatever hostname the user landed on; if they visit www.estia.co.il,
# the cookie lives on www, but `redirect_uri` sends them back to the
# apex after Google auth and the cookie never comes along →
# `google_missing_state`. Force everyone onto estia.co.il up front.
# This MUST stay after the catch-all above: nginx picks the first
# server block as the fallback when no server_name matches, and we
# do NOT want Host:estia.co.il (which matches nothing explicit) to
# fall through into the www redirect and self-loop.
server {
  listen 80;
  server_name www.estia.co.il;
  return 301 https://estia.co.il$request_uri;
}
