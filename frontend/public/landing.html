<style>
  html, body { margin: 0; padding: 0; font-family: Assistant, Heebo, -apple-system, sans-serif; background: #f7f3ec; min-height: 100vh; }
  * { box-sizing: border-box; }
  #root { min-height: 100vh; }
  /* Mobile drawer — injected by wireMobileMenu() when the bundle's
     hamburger icon is tapped. Kept in the base stylesheet so the open
     animation is ready as soon as the script mounts it. */
  #lpMobileDrawer { position: fixed; inset: 0; z-index: 1000; }
  .lp-drawer-scrim {
    position: absolute; inset: 0;
    background: rgba(20, 17, 13, 0.45);
    backdrop-filter: blur(2px);
    animation: lp-drawer-fade 160ms ease-out;
  }
  .lp-drawer {
    position: absolute; top: 0; bottom: 0; inset-inline-end: 0;
    width: min(86vw, 340px);
    background: #fbf7f0; color: #1e1a14;
    border-inline-start: 1px solid rgba(30, 17, 13, 0.08);
    box-shadow: -20px 0 60px rgba(30, 17, 13, 0.22);
    padding: 28px 24px; display: flex; flex-direction: column;
    font-family: Assistant, Heebo, sans-serif;
    animation: lp-drawer-slide 220ms ease-out;
  }
  .lp-drawer-close {
    align-self: flex-start;
    background: transparent; border: 0; color: #6b6356;
    font-size: 20px; cursor: pointer; padding: 4px 8px; line-height: 1;
  }
  .lp-drawer nav ul { list-style: none; margin: 24px 0 0; padding: 0; }
  .lp-drawer nav li { margin-bottom: 4px; }
  .lp-drawer nav a {
    display: block; padding: 14px 6px;
    font-size: 18px; font-weight: 700; color: #1e1a14;
    border-bottom: 1px solid rgba(30, 17, 13, 0.06);
    text-decoration: none;
  }
  .lp-drawer-cta {
    margin-top: auto; padding-top: 20px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .lp-drawer-primary {
    display: block; text-align: center; padding: 14px 18px;
    background: linear-gradient(180deg, #d9b774, #b48b4c);
    color: #1e1a14; font-weight: 800; font-size: 15px;
    border-radius: 12px; text-decoration: none;
    box-shadow: 0 8px 24px rgba(180,139,76,0.28), inset 0 1px 0 rgba(255,255,255,0.35);
  }
  .lp-drawer-secondary {
    display: block; text-align: center; padding: 13px 18px;
    background: #fff; color: #1e1a14; font-weight: 700; font-size: 15px;
    border: 1px solid rgba(30, 17, 13, 0.14);
    border-radius: 12px; text-decoration: none;
  }
  @keyframes lp-drawer-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes lp-drawer-slide {
    from { transform: translateX(-100%); }
    to   { transform: translateX(0); }
  }
  [dir="rtl"] @keyframes lp-drawer-slide {
    from { transform: translateX(100%); }
    to   { transform: translateX(0); }
  }

  /* While React/Babel boot, show a cream splash instead of the raw
     #d6d0c6 the design originally used — keeps the FCP on-brand. */
  .estia-boot {
    display: grid; place-items: center; min-height: 100vh;
    color: #7a5c2c; font-family: Assistant, Heebo, sans-serif;
    font-weight: 700; letter-spacing: 0.2em;
  }
  .estia-boot span { animation: estia-boot-pulse 1.4s ease-in-out infinite; }
  @keyframes estia-boot-pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  /* The DirectionA component fixes its content width at 1280px. On
     narrow viewports we swap to DirectionAMobile via JS, which ships
     a dedicated 390-wide layout — but we still cap overflow-x on the
     body to avoid horizontal scroll jitter during hydration. */
  body { overflow-x: hidden; }
</style>

<body>
<div id="root"><div class="estia-boot"><span>ESTIA ✦</span></div></div>

<!-- React 18 + Babel standalone — matches the design bundle's setup. -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Bundle files copied verbatim from claude.ai/design handoff
     (estia-new-project/project/src/*). The DesignCanvas review chrome
     was stripped — in production we render DirectionA / DirectionAMobile
     directly. -->
<script src="/landing/copy.js"></script>
<script type="text/babel" src="/landing/ios-frame.jsx"></script>
<script type="text/babel" src="/landing/shared.jsx"></script>
<script type="text/babel" src="/landing/DirectionA.jsx"></script>
<script type="text/babel" src="/landing/DirectionAMobile.jsx"></script>

<script type="text/babel">
// Responsive: render DirectionA on desktop, DirectionAMobile below 768px.
// Re-renders on resize so the transition is live.
function useIsMobile() {
  const [mobile, setMobile] = React.useState(() => typeof window !== 'undefined' && window.innerWidth < 768);
  React.useEffect(() => {
    var mq = window.matchMedia('(max-width: 767px)');
    var onChange = function () { setMobile(mq.matches); };
    if (mq.addEventListener) mq.addEventListener('change', onChange); else mq.addListener(onChange);
    return function () { if (mq.removeEventListener) mq.removeEventListener('change', onChange); else mq.removeListener(onChange); };
  }, []);
  return mobile;
}

function Landing() {
  var isMobile = useIsMobile();
  var copy = window.ESTIA_COPY;
  // The design's DirectionA is laid out for a fixed 1440 artboard. In
  // production we let it flex to the viewport by dropping a max-width
  // wrapper; the component itself caps its inner containers to 1280.
  return isMobile
    ? <DirectionAMobile copy={copy} />
    : <DirectionA copy={copy} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Landing />);

// CTA wiring — the design's buttons have no hrefs (they were live-
// preview only). Post-mount, rewrite primary CTAs to /login?flow=signup
// and secondary/login CTAs to /login.
function wireCtas() {
  var btns = document.querySelectorAll('#root button');
  btns.forEach(function (b) {
    var txt = (b.textContent || '').trim();
    if (b.dataset.ctaWired) return;
    var go = null;
    if (/התחלה חינם/.test(txt) || /ל-?30 יום/.test(txt) || /להתחלה חינם/.test(txt)) {
      go = '/login?flow=signup&utm_source=landing&utm_medium=' + (txt.length > 18 ? 'hero' : 'nav');
    } else if (/כבר יש לי חשבון/.test(txt) || /התחברות/.test(txt)) {
      go = '/login?utm_source=landing';
    }
    if (!go) return;
    b.dataset.ctaWired = '1';
    b.style.cursor = 'pointer';
    b.addEventListener('click', function (e) { e.preventDefault(); window.location.href = go; });
  });
  // Anchor tags used as CTA triggers. DirectionA's top-nav "התחברות"
  // is an <a href="#">, but DirectionAMobile renders it as a bare <a>
  // with no href attribute at all. Cover both shapes + any hrefless
  // anchor whose text matches a CTA phrase.
  document.querySelectorAll('#root a').forEach(function (a) {
    if (a.dataset.ctaWired) return;
    var txt = (a.textContent || '').trim();
    var href = a.getAttribute('href');
    // Only touch anchors without a real destination — anything already
    // pointing at an in-page anchor (#features, #pricing) or external
    // URL keeps its own behavior.
    if (href && href !== '#') return;
    var go = null;
    if (/התחברות/.test(txt)) go = '/login?utm_source=landing';
    else if (/הרשמה חינם|התחלה חינם/.test(txt)) go = '/login?flow=signup&utm_source=landing';
    if (!go) return;
    a.href = go;
    a.style.cursor = 'pointer';
    a.dataset.ctaWired = '1';
    // <a> without href isn't focusable by default — add an explicit
    // click handler so mobile taps route immediately, and a tabindex
    // so keyboard users can reach it.
    if (!a.hasAttribute('tabindex')) a.setAttribute('tabindex', '0');
    a.addEventListener('click', function (e) { e.preventDefault(); window.location.href = go; });
  });
}
// Run once after initial mount, then again on every in-component
// re-render (pricing toggle, FAQ open, etc.) — MutationObserver is
// overkill for a marketing page; a short polling window is fine.
var wireTries = 0;
(function wireLoop() {
  wireCtas();
  wireMobileMenu();
  if (wireTries++ < 20) setTimeout(wireLoop, 200);
})();

// Mobile hamburger — DirectionAMobile renders a bare three-line <svg>
// in the sticky header with no click handler. Find it, wrap/bind a
// tap that opens a minimal drawer listing the section anchors +
// login / signup.
function wireMobileMenu() {
  var header = document.querySelector('#root header');
  if (!header || header.dataset.menuWired) return;
  // The hamburger icon (name="menu" in shared Icon) is the last svg
  // in the header's action cluster. Match by line count: 3 <line> kids.
  var svgs = header.querySelectorAll('svg');
  var hamburger = null;
  svgs.forEach(function (s) { if (s.querySelectorAll('line').length === 3) hamburger = s; });
  if (!hamburger) return;
  header.dataset.menuWired = '1';
  hamburger.style.cursor = 'pointer';
  hamburger.setAttribute('role', 'button');
  hamburger.setAttribute('tabindex', '0');
  hamburger.setAttribute('aria-label', 'תפריט');

  function openDrawer() {
    if (document.getElementById('lpMobileDrawer')) return;
    var wrap = document.createElement('div');
    wrap.id = 'lpMobileDrawer';
    wrap.innerHTML =
      '<div class="lp-drawer-scrim"></div>' +
      '<aside class="lp-drawer" role="dialog" aria-modal="true" aria-label="תפריט">' +
        '<button type="button" class="lp-drawer-close" aria-label="סגור">✕</button>' +
        '<nav><ul>' +
          '<li><a href="#features">תכונות</a></li>' +
          '<li><a href="#ai">Estia AI</a></li>' +
          '<li><a href="#mobile">אפליקציה</a></li>' +
          '<li><a href="#pricing">מחירים</a></li>' +
          '<li><a href="#faq">שאלות</a></li>' +
        '</ul></nav>' +
        '<div class="lp-drawer-cta">' +
          '<a class="lp-drawer-primary" href="/login?flow=signup&utm_source=landing&utm_medium=drawer">התחלה חינם ל-30 יום</a>' +
          '<a class="lp-drawer-secondary" href="/login?utm_source=landing&utm_medium=drawer_login">התחברות</a>' +
        '</div>' +
      '</aside>';
    document.body.appendChild(wrap);
    document.body.style.overflow = 'hidden';
    var close = function () {
      wrap.remove();
      document.body.style.overflow = '';
    };
    wrap.querySelector('.lp-drawer-scrim').addEventListener('click', close);
    wrap.querySelector('.lp-drawer-close').addEventListener('click', close);
    wrap.querySelectorAll('a').forEach(function (link) {
      link.addEventListener('click', function (e) {
        var href = link.getAttribute('href') || '';
        if (href.charAt(0) === '#') {
          e.preventDefault();
          var target = document.querySelector(href);
          close();
          if (target) setTimeout(function () { target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 0);
        } else {
          // Absolute URL — let the link follow; close for tidiness.
          close();
        }
      });
    });
    document.addEventListener('keydown', function esc(e) {
      if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
    });
  }
  hamburger.addEventListener('click', openDrawer);
  hamburger.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDrawer(); }
  });
}
</script>
