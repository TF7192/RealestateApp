<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- SEO / Lighthouse: document meta description -->
    <meta
      name="description"
      content="Estia — CRM לניהול נכסים, לקוחות, ולידים לסוכני נדל״ן בישראל. ניהול יומיומי בעברית, בלחיצה אחת, מהטלפון."
    />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f7f3ec" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Estia" />
    <!-- ?v=gd1 cache-busts Cloudflare's 4h edge cache after the
         gold-diamond logo swap. Bump the suffix on future logo changes. -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=gd1" />

    <!-- Favicon: SVG first for modern browsers (crisp, themed), PNG
         fallback for older ones. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=gd1" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png?v=gd1" />

    <!-- Fonts — Assistant 400/500/700 self-hosted (PERF-017).
         Previously we hit fonts.googleapis.com for 6 weights (300-800)
         which forced a TLS+TCP hop on every cold load. The CDN was
         flagged by Lighthouse as render-blocking and we never used the
         300/600/800 weights in the design system. The @font-face rules
         live in index.css; we preload just the 400 woff2 here so the
         first paint has the regular weight in flight before the CSS
         parses. font-display: swap keeps text visible while the woff2
         downloads. -->
    <link rel="preload" as="font" type="font/woff2"
          href="/fonts/assistant-400.woff2" crossorigin>

    <title>Estia — ניהול נכסים ולידים</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // We previously registered /sw.js for "PWA installability" but never
      // used it for offline. Net effect: every CSS-affecting deploy required
      // the user to force-quit because the SW served stale CSS for hours
      // until iOS WKWebView re-checked the SW script. Cost > benefit.
      //
      // This block runs on EVERY page load. On the first load after this
      // ships, it (a) unregisters every existing SW, (b) wipes every
      // cache the SW created, (c) one-shot-reloads so the next paint
      // runs free of SW interception. The sessionStorage flag prevents
      // an infinite reload loop.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs){
          if (!regs || regs.length === 0) return;
          var unregs = regs.map(function(r){ return r.unregister().catch(function(){ return false; }); });
          var cachesGone = (typeof caches !== 'undefined')
            ? caches.keys().then(function(keys){ return Promise.all(keys.map(function(k){ return caches.delete(k).catch(function(){ return false; }); })); }).catch(function(){})
            : Promise.resolve();
          Promise.all([Promise.all(unregs), cachesGone]).then(function(){
            try {
              if (!sessionStorage.getItem('estia-sw-purged')) {
                sessionStorage.setItem('estia-sw-purged', '1');
                location.reload();
              }
            } catch (_) { /* ignore */ }
          });
        }).catch(function(){});
      }
    </script>
  </body>
</html>
