# Production compose — RDS-backed, S3-backed, single-host runtime.
# Database lives in RDS (estia-prod-db.eu-north-1.rds.amazonaws.com).
# Uploads live in S3 (estia-prod bucket). The host runs only the backend
# + frontend containers.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      UPLOADS_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "${BACKEND_BIND_ADDR:-127.0.0.1}:${BACKEND_PORT:-6002}:4000"
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: [ backend ]
    ports:
      - "${FRONTEND_BIND_ADDR:-127.0.0.1}:${FRONTEND_PORT:-3001}:80"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  uploads_data:
