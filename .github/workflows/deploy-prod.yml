name: Deploy → production

# Registry-based deploy (2026-04-21 redesign).
#
# Flow:
#   1. (optional, default on) Call build-images.yml to bake backend +
#      frontend images and push to GHCR, tagged with the short SHA.
#      Skipped on rollback (images for older SHAs already exist).
#   2. SSH to the EC2, `docker login ghcr.io` with the runner-minted
#      GITHUB_TOKEN, `docker compose pull` the SHA-tagged images,
#      `up -d`, migrate, smoke.
#
# Triggers: strictly manual (workflow_dispatch). No tag-push deploys.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or SHA). For rollback, pass the older SHA.'
        required: true
        default: 'main'
      skip_build:
        description: 'Skip building images; reuse what is already in GHCR for the ref. Set true for rollback.'
        required: false
        default: 'false'
        type: boolean
      skip_migrations:
        description: 'Skip prisma migrate deploy (rollback to a pre-migration SHA).'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: estia-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  resolve:
    name: Resolve ref
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      sha: ${{ steps.r.outputs.sha }}
      short: ${{ steps.r.outputs.short }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - id: r
        run: |
          SHA=$(git rev-parse HEAD)
          SHORT=$(git rev-parse --short HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"
          echo "Resolved ${{ inputs.ref }} → $SHA"

  notify-starting:
    name: Slack — starting
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/slack-notify
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: starting
          title: deploying `${{ inputs.ref }}` → production
          details: |
            *target SHA:* `${{ needs.resolve.outputs.short }}`
            *skip build:* `${{ inputs.skip_build }}` · *skip migrations:* `${{ inputs.skip_migrations }}`
            *triggered by:* ${{ github.actor }}

  build:
    name: Build images
    needs: resolve
    if: inputs.skip_build != true
    uses: ./.github/workflows/build-images.yml
    with:
      ref: ${{ inputs.ref }}
    secrets: inherit

  deploy:
    name: Pull + up on EC2
    needs: [ resolve, build ]
    if: always() && needs.resolve.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/estia.pem
          chmod 600 ~/.ssh/estia.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync compose file
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/estia.pem" \
            ./docker-compose.prod.yml \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/estia-new/docker-compose.prod.yml"

      - name: Sync managed secrets to EC2 .env
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          PUBLIC_ORIGIN: ${{ secrets.PUBLIC_ORIGIN }}
          POSTHOG_PROJECT_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
        run: |
          umask 077
          PATCH=$(mktemp)
          {
            [ -n "$GOOGLE_CLIENT_ID" ]        && echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID"
            [ -n "$GOOGLE_CLIENT_SECRET" ]    && echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET"
            [ -n "$PUBLIC_ORIGIN" ]           && echo "PUBLIC_ORIGIN=$PUBLIC_ORIGIN"
            [ -n "$POSTHOG_PROJECT_API_KEY" ] && echo "POSTHOG_PROJECT_API_KEY=$POSTHOG_PROJECT_API_KEY"
            [ -n "$POSTHOG_HOST" ]            && echo "POSTHOG_HOST=$POSTHOG_HOST"
          } > "$PATCH"
          if [ ! -s "$PATCH" ]; then
            echo "No managed secrets set — skipping .env patch"
            rm -f "$PATCH"; exit 0
          fi
          scp -i ~/.ssh/estia.pem "$PATCH" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/estia-env-patch"
          rm -f "$PATCH"
          ssh -i ~/.ssh/estia.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" '
            set -e
            ENV_FILE=/home/ec2-user/estia-new/.env
            sudo touch "$ENV_FILE"
            sudo chmod 600 "$ENV_FILE"
            while IFS="=" read -r key _; do
              [ -n "$key" ] && sudo sed -i "/^${key}=/d" "$ENV_FILE"
            done < /tmp/estia-env-patch
            cat /tmp/estia-env-patch | sudo tee -a "$ENV_FILE" >/dev/null
            shred -u /tmp/estia-env-patch 2>/dev/null || rm -f /tmp/estia-env-patch
          '

      - name: Snapshot previous deploy
        run: |
          ssh -i ~/.ssh/estia.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" '
            cd /home/ec2-user/estia-new
            if [ -f .deployed_sha ]; then
              PREV=$(cat .deployed_sha)
              echo "previous SHA: $PREV"
              echo "$(date -u +%FT%TZ) rolled_from=$PREV rolling_to=${{ needs.resolve.outputs.sha }} skip_build=${{ inputs.skip_build }}" >> .deploy_history
              tail -10 .deploy_history > .deploy_history.tmp && mv .deploy_history.tmp .deploy_history
            fi
          '

      - name: Pull images + up
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ESTIA_TAG: ${{ needs.resolve.outputs.short }}
          SKIP_MIGRATIONS: ${{ inputs.skip_migrations }}
        run: |
          ssh -i ~/.ssh/estia.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "GHCR_TOKEN='$GHCR_TOKEN' ESTIA_TAG='$ESTIA_TAG' SKIP_MIGRATIONS='$SKIP_MIGRATIONS' bash -s" <<'REMOTE'
          set -euo pipefail
          cd /home/ec2-user/estia-new
          echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u token --password-stdin >/dev/null
          export ESTIA_TAG
          sudo -E docker compose -f docker-compose.prod.yml pull
          sudo -E docker compose -f docker-compose.prod.yml up -d --remove-orphans
          if [ "$SKIP_MIGRATIONS" = "true" ]; then
            echo 'skip_migrations=true — not running prisma migrate deploy'
          else
            sudo -E docker compose -f docker-compose.prod.yml exec -T backend npx prisma migrate deploy
          fi
          echo "$ESTIA_TAG" | sudo tee .deployed_sha >/dev/null
          sudo docker image prune -af >/dev/null 2>&1 || true
          sudo docker logout ghcr.io >/dev/null 2>&1 || true
          df -h / | tail -1
          REMOTE

      - name: Smoke test
        # Runs on the EC2 host against the local nginx container directly
        # (127.0.0.1 via the docker-published port). Going through
        # Cloudflare here is fragile — CF sometimes serves a Bot Fight
        # JS challenge to origin-local IPs, which makes the curl return
        # an HTML blob that grep'ing for '"ok":true' misses and fails
        # the probe even though the app is healthy. Loopback → nginx →
        # backend is what we actually want to verify post-rollout, and
        # has zero CF flakes.
        run: |
          ssh -i ~/.ssh/estia.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" 'bash -s' <<'REMOTE'
          set -u
          # The frontend nginx container binds to 127.0.0.1:3001 (per the
          # FRONTEND_BIND_ADDR/FRONTEND_PORT defaults in docker-compose.yml).
          FRONT_BASE="http://127.0.0.1:3001"
          # The backend also listens on 127.0.0.1:6002, but every public path
          # goes through the frontend's nginx which proxies /api/* to it —
          # so hitting the frontend base exercises the full real chain.
          PASS=0
          for i in 1 2 3 4 5 6; do
            HEALTH=$(curl -s --max-time 5 -H "Host: estia.co.il" "$FRONT_BASE/api/health" || true)
            ROOT=$(curl -s --max-time 5 -H "Host: estia.co.il" -o /dev/null -w "%{http_code}" "$FRONT_BASE/" || true)
            AUTH=$(curl -s --max-time 5 -H "Host: estia.co.il" -o /dev/null -w "%{http_code}" "$FRONT_BASE/api/me" || true)
            echo "attempt $i: /api/health=$HEALTH  /=$ROOT  /api/me=$AUTH"
            if echo "$HEALTH" | grep -q '"ok":true' && [ "$ROOT" = "200" ] && [ "$AUTH" = "401" ]; then
              PASS=1
              break
            fi
            sleep 5
          done
          if [ "$PASS" != "1" ]; then
            echo "::error::smoke test failed"
            exit 1
          fi
          echo "✓ smoke passed"
          REMOTE

      - name: Deploy summary
        if: always()
        run: |
          {
            echo "## Deploy ${{ job.status }}"
            echo ""
            echo "- **Ref:** \`${{ inputs.ref }}\` → \`${{ needs.resolve.outputs.short }}\`"
            echo "- **Skip build / migrations:** \`${{ inputs.skip_build }}\` / \`${{ inputs.skip_migrations }}\`"
            echo "- **Backend image:** \`ghcr.io/tf7192/estia-backend:${{ needs.resolve.outputs.short }}\`"
            echo "- **Frontend image:** \`ghcr.io/tf7192/estia-frontend:${{ needs.resolve.outputs.short }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/estia.pem

  notify-finished:
    name: Slack — finished
    needs: [ resolve, deploy ]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/slack-notify
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: ${{ needs.deploy.result == 'success' && 'success' || (needs.deploy.result == 'cancelled' && 'cancelled' || 'failure') }}
          title: >-
            ${{ needs.deploy.result == 'success' && 'production deployed & smoke OK' || (needs.deploy.result == 'cancelled' && 'production deploy cancelled' || 'production deploy FAILED') }}
          details: |
            *ref:* `${{ inputs.ref }}` → `${{ needs.resolve.outputs.short }}`
            *site:* https://estia.co.il
            *rollback:* `gh workflow run deploy-prod.yml -f ref=<older-sha> -f skip_build=true`
