name: Test

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs — no point spending minutes on an old commit.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run test:unit

  integration:
    name: Integration (API + DB)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: estia
          POSTGRES_PASSWORD: estia
          POSTGRES_DB: estia_test
        ports: ['54329:5432']
        options: >-
          --health-cmd="pg_isready -U estia -d estia_test"
          --health-interval=2s --health-timeout=2s --health-retries=30
    env:
      DATABASE_URL: postgresql://estia:estia@localhost:54329/estia_test
      JWT_SECRET: test-jwt-secret
      COOKIE_SECRET: test-cookie-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Prisma generate
        working-directory: backend
        run: npx prisma generate
      - name: Run integration suite
        run: npm run test:integration

  e2e-critical:
    name: E2E — critical paths
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only runs the @critical-tagged spec on every push — fast safety net.
    # The full E2E matrix runs nightly via a separate workflow (TODO).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: estia
          POSTGRES_PASSWORD: estia
          POSTGRES_DB: estia_test
        ports: ['54329:5432']
        options: >-
          --health-cmd="pg_isready -U estia -d estia_test"
          --health-interval=2s --health-timeout=2s --health-retries=30
    env:
      DATABASE_URL: postgresql://estia:estia@localhost:54329/estia_test
      JWT_SECRET: test-jwt-secret
      COOKIE_SECRET: test-cookie-secret
      PUBLIC_URL: http://localhost:5173
      TEST_AGENT_EMAIL: agent.demo@estia.app
      TEST_AGENT_PASSWORD: Password1!
      PLAYWRIGHT_WEB_URL: http://127.0.0.1:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - working-directory: backend
        run: npm ci && npx prisma generate && npx prisma migrate deploy && npm run db:seed
      - working-directory: frontend
        run: npm ci && npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Start backend (background)
        working-directory: backend
        run: npm run build && (node dist/server.js &) && sleep 3
      - name: Start frontend preview (background)
        working-directory: frontend
        run: (npx vite preview --host 127.0.0.1 --port 5173 &) && sleep 3
      - name: Run critical-path E2E
        run: npm run test:e2e:critical
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
