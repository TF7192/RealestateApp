name: Deploy to production

# Triggers on push of any tag matching `v*` (per the deploy convention).
# Manual dispatch is also allowed for hotfixes.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: estia-prod
  cancel-in-progress: false   # don't cancel a deploy mid-flight

jobs:
  deploy:
    name: ssh → rsync → docker compose
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/estia.pem
          chmod 600 ~/.ssh/estia.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync source to EC2
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/estia.pem" \
            --include='/backend/' --include='/backend/src/***' --include='/backend/prisma/***' \
            --include='/backend/package.json' --include='/backend/package-lock.json' \
            --include='/backend/Dockerfile' --include='/backend/tsconfig.json' \
            --include='/frontend/' --include='/frontend/src/***' --include='/frontend/public/***' \
            --include='/frontend/package.json' --include='/frontend/package-lock.json' \
            --include='/frontend/Dockerfile' --include='/frontend/nginx.conf' \
            --include='/frontend/index.html' --include='/frontend/vite.config.js' \
            --include='/frontend/eslint.config.js' --include='/frontend/capacitor.config.json' \
            --include='/docker-compose.yml' --include='/scripts/***' \
            --exclude='*' \
            ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/estia-new/"

      # Surgically patch the production .env with secrets managed centrally
      # in GitHub Actions. We only touch the keys listed in MANAGED_KEYS — any
      # other line (DATABASE_URL, JWT_SECRET, AWS_*, …) is preserved as-is, so
      # this is safe to run unconditionally on every deploy.
      - name: Sync managed secrets to EC2 .env
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          PUBLIC_ORIGIN: ${{ secrets.PUBLIC_ORIGIN }}
          POSTHOG_PROJECT_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
        run: |
          # Build a patch file locally (never logged — keep secrets out of CI output).
          umask 077
          PATCH=$(mktemp)
          {
            [ -n "$GOOGLE_CLIENT_ID" ]        && echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID"
            [ -n "$GOOGLE_CLIENT_SECRET" ]    && echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET"
            [ -n "$PUBLIC_ORIGIN" ]           && echo "PUBLIC_ORIGIN=$PUBLIC_ORIGIN"
            [ -n "$POSTHOG_PROJECT_API_KEY" ] && echo "POSTHOG_PROJECT_API_KEY=$POSTHOG_PROJECT_API_KEY"
            [ -n "$POSTHOG_HOST" ]            && echo "POSTHOG_HOST=$POSTHOG_HOST"
          } > "$PATCH"

          if [ ! -s "$PATCH" ]; then
            echo "No managed secrets set — skipping .env patch"
            rm -f "$PATCH"
            exit 0
          fi

          scp -i ~/.ssh/estia.pem "$PATCH" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/estia-env-patch"
          rm -f "$PATCH"

          ssh -i ~/.ssh/estia.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" '
            set -e
            ENV_FILE=/home/ec2-user/estia-new/.env
            sudo touch "$ENV_FILE"
            sudo chmod 600 "$ENV_FILE"
            # Strip any existing lines for keys we manage, then append the new values.
            while IFS="=" read -r key _; do
              [ -n "$key" ] && sudo sed -i "/^${key}=/d" "$ENV_FILE"
            done < /tmp/estia-env-patch
            cat /tmp/estia-env-patch | sudo tee -a "$ENV_FILE" >/dev/null
            shred -u /tmp/estia-env-patch 2>/dev/null || rm -f /tmp/estia-env-patch
          '

      - name: Build + restart on EC2
        run: |
          ssh -i ~/.ssh/estia.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" '
            set -e
            cd /home/ec2-user/estia-new
            # Prune BEFORE building so we never run out of disk mid-build.
            # t3.small has 8–16GB root; each stale layer cache can be 1GB+.
            sudo docker builder prune -af >/dev/null 2>&1 || true
            sudo docker image prune -af >/dev/null 2>&1 || true
            sudo docker compose build --pull
            # --remove-orphans drops services no longer defined in the file
            # (e.g. the legacy postgres + redis containers from when the DB
            # ran on the host).  Keeps the EC2 in lockstep with the repo.
            sudo docker compose up -d --remove-orphans
            sudo docker compose exec -T backend npx prisma migrate deploy
            df -h / | tail -1
          '

      - name: Healthcheck
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf https://estia.tripzio.xyz/api/health | grep -q '"ok":true'; then
              echo "✓ deploy healthy on attempt $i"
              exit 0
            fi
            echo "  waiting for backend ($i/5)…"
            sleep 5
          done
          echo "✗ healthcheck failed"
          exit 1

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/estia.pem
