version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule: { interval: weekly, day: monday, time: '04:00', timezone: Asia/Jerusalem }
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [ minor, patch ]
    labels: [ dependencies ]

  - package-ecosystem: npm
    directory: /backend
    schedule: { interval: weekly, day: monday, time: '04:00', timezone: Asia/Jerusalem }
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [ minor, patch ]
    labels: [ dependencies, backend ]

  - package-ecosystem: npm
    directory: /frontend
    schedule: { interval: weekly, day: monday, time: '04:00', timezone: Asia/Jerusalem }
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [ minor, patch ]
    labels: [ dependencies, frontend ]

  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: monthly }
    labels: [ dependencies, ci ]

  - package-ecosystem: docker
    directory: /backend
    schedule: { interval: monthly }
    labels: [ dependencies, docker ]

  - package-ecosystem: docker
    directory: /frontend
    schedule: { interval: monthly }
    labels: [ dependencies, docker ]
